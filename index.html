<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İkame Araç Takip Panel</title>
  <style>
    body { font-family: sans-serif; background: #f4f6f8; margin: 0; padding: 20px; }
    h1 { text-align: center; color: #333; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; max-width: 1000px; margin: 20px auto; }
    .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 6px solid #ccc; }
    .card.dolu { border-left-color: #e74c3c; } /* Kırmızı */
    .card.bosta { border-left-color: #2ecc71; } /* Yeşil */
    .plaka { font-size: 1.2em; font-weight: bold; color: #2c3e50; }
    .durum { display: inline-block; margin-top: 8px; padding: 4px 8px; border-radius: 4px; font-weight: bold; color: white; font-size: 0.85em; }
    .durum.dolu { background: #e74c3c; }
    .durum.bosta { background: #2ecc71; }
    .detay { color: #666; font-size: 0.9em; margin-top: 5px; }
  </style>
</head>
<body>

  <h1>🚗 İkame Araç Durum Panosu</h1>
  <div id="loading" style="text-align:center;">Veriler yükleniyor...</div>
  <div id="arac-listesi" class="grid"></div>

  <script>
    // Buraya Google E-Tablo Apps Script API Linki gelecek
    const API_URL = "GOOGLE_APPS_SCRIPT_LINKI_BURAYA_GELECEK";

    async function verileriGetir() {
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        
        document.getElementById('loading').style.display = 'none';
        const liste = document.getElementById('arac-listesi');
        liste.innerHTML = '';

        data.forEach(arac => {
          // Tablondaki sütun isimlerine göre buraları eşleyeceğiz
          const plaka = arac.Plaka || "Bilinmiyor";
          const durum = (arac.Durum || "").toUpperCase(); 
          const model = arac.Model || "";
          
          const isDolu = durum.includes("DOLU");
          const cssClass = isDolu ? "dolu" : "bosta";

          liste.innerHTML += `
            <div class="card ${cssClass}">
              <div class="plaka">${plaka}</div>
              <div class="detay">${model}</div>
              <span class="durum ${cssClass}">${durum}</span>
            </div>
          `;
        });
      } catch (error) {
        document.getElementById('loading').innerText = "Veri çekilemedi. API URL'sini kontrol edin.";
      }
    }

    if(API_URL !== "GOOGLE_APPS_SCRIPT_LINKI_BURAYA_GELECEK") {
      verileriGetir();
    }
  </script>
</body>
</html>
